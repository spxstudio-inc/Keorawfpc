<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin KYC Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>

<script src="js/firebase.js"></script>
<link rel="icon" type="image/x-icon" href="images/favicon.ico">
</head>

<body class="bg-gray-100 p-10">


<h1 class="text-3xl font-bold mb-6 text-green-800">
KYC Admin Verification Panel
</h1>


<div class="bg-white shadow rounded-lg p-6">

<table class="w-full">

<thead class="border-b">

<tr class="text-left">

<th class="p-3">Name</th>
<th class="p-3">Email</th>
<th class="p-3">PAN</th>
<th class="p-3">Status</th>
<th class="p-3">Action</th>

</tr>

</thead>

<tbody id="userTable">

</tbody>

</table>

</div>



<script>
    let confirmationResult

function sendOTP(){

let phone = "+91" + document.getElementById("mobile").value

let recaptcha = new firebase.auth.RecaptchaVerifier(
"recaptcha-container"
)

auth.signInWithPhoneNumber(phone,recaptcha)

.then(result=>{

confirmationResult = result

alert("OTP Sent")

})

.catch(error=>{

alert(error.message)

})

}
function verifyOTP(){

let code = document.getElementById("otp").value

confirmationResult.confirm(code)

.then(()=>{

alert("Mobile Verified")

})

.catch(()=>{

alert("Invalid OTP")

})

}

db.collection("users").get().then(snapshot=>{

snapshot.forEach(doc=>{

let user = doc.data()
let uid = doc.id

let row = `

<tr class="border-b">

<td class="p-3">${user.name}</td>
<td class="p-3">${user.email}</td>
<td class="p-3">${user.pan}</td>
<td class="p-3">${user.status}</td>

<td class="p-3 space-x-2">

<button
onclick="approve('${uid}')"
class="bg-green-600 text-white px-3 py-1 rounded">

Approve

</button>

<button
onclick="reject('${uid}')"
class="bg-red-600 text-white px-3 py-1 rounded">

Reject

</button>

</td>

</tr>

`

document.getElementById("userTable").innerHTML += row

})

})



function approve(uid){

db.collection("users").doc(uid).update({

status:"Approved"

})

alert("User Approved")

location.reload()

}



function reject(uid){

db.collection("users").doc(uid).update({

status:"Rejected"

})

alert("User Rejected")

location.reload()

}

</script>


</body>
</html>
