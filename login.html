<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Keora Women Producer</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="js/firebase.js"></script>
<link rel="icon" type="image/x-icon" href="images/favicon.ico">

</head>

<body class="bg-green-50 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-md">

<div class="text-center mb-6">

<img src="images/logo.png" class="w-16 h-16 mx-auto mb-3 rounded-full">

<h2 class="text-2xl font-bold text-green-800">
Member Login
</h2>

<p class="text-gray-500 text-sm">
Access your NGO member dashboard
</p>

</div>


<input
id="email"
type="text"
placeholder="Email or Mobile"
class="w-full border p-3 mb-4 rounded focus:outline-none focus:border-green-600">


<input
id="password"
type="password"
placeholder="Password"
class="w-full border p-3 mb-4 rounded focus:outline-none focus:border-green-600">


<button
onclick="login()"
class="w-full bg-green-700 text-white p-3 rounded hover:bg-green-800">

Login

</button>


<p class="text-center mt-4 text-sm">

Don't have an account?

<a href="register.html" class="text-green-700 font-semibold">
Register
</a>

</p>

</div>


<script>

function login(){

let email=document.getElementById("email").value
let pass=document.getElementById("password").value

let stored=JSON.parse(localStorage.getItem("user"))

if(!stored){

alert("No account found")
return

}

if(email===stored.email && pass===stored.password){

alert("Login successful")

window.location="dashboard.html"

}else{

alert("Invalid login")

}

}

</script>

</body>
</html>
